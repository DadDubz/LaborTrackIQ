name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend preflight
        run: PYTHONPATH=backend python backend/scripts/preflight.py

      - name: Verify migrations can upgrade and downgrade
        run: |
          PYTHONPATH=backend alembic -c backend/alembic.ini upgrade head
          PYTHONPATH=backend alembic -c backend/alembic.ini downgrade base
          PYTHONPATH=backend alembic -c backend/alembic.ini upgrade head

      - name: Run backend smoke tests
        run: python -m unittest discover -s backend/tests -p "test_*.py"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
